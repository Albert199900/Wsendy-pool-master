<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billiard Pro - Monetag Edition</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #ui { width: 360px; display: flex; justify-content: space-between; padding: 10px; background: #333; border-radius: 10px 10px 0 0; box-sizing: border-box; border: 2px solid #5d3a1a; }
        canvas { background: #076324; border: 8px solid #5d3a1a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: crosshair; touch-action: none; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; z-index: 100; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        button { padding: 15px 25px; font-size: 18px; cursor: pointer; border: none; border-radius: 50px; margin: 10px; font-weight: bold; width: 250px; transition: 0.2s; }
        .btn-retry { background: #27ae60; color: white; box-shadow: 0 4px #1e8449; }
        .btn-life { background: #e67e22; color: white; box-shadow: 0 4px #d35400; }
        button:active { transform: translateY(4px); box-shadow: none; }
        h1 { margin: 0; color: #f1c40f; }
    </style>
</head>
<body>

    <div id="ui">
        <div>🏆 Lvl: <span id="lvl">1</span></div>
        <div>💰 <span id="cns">0</span></div>
        <div>❤️ <span id="lvs">3</span></div>
    </div>

    <canvas id="poolTable"></canvas>

    <div id="gameOverModal" class="modal">
        <h1>GAME OVER</h1>
        <p id="gameOverText" style="font-size: 20px; margin: 20px 0;"></p>
        
        <button class="btn-retry" onclick="handleRetry()">🔄 Play Again (Link 1)</button>
        
        <button class="btn-life" onclick="handleFreeLife()">🎁 Free Life (Link 2)</button>
    </div>

    <script>
        const canvas = document.getElementById('poolTable');
        const ctx = canvas.getContext('2d');
        canvas.width = 360;
        canvas.height = 550;

        // --- LINKS ZAKO ZA MONETAG ---
        const LINK_1 = "https://omg10.com/4/10897169";
        const LINK_2 = "https://omg10.com/4/10897168";

        let lives = 3;
        let coins = 0;
        let currentLevel = 1;
        let isPaused = false;
        let isDragging = false;
        let startX, startY, mouseX, mouseY;
        let balls = [];

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'sw-TZ';
            window.speechSynthesis.speak(msg);
        }

        function initLevel(lvl) {
            balls = [{ x: 180, y: 400, r: 12, color: 'white', dx: 0, dy: 0 }];
            for (let i = 0; i < lvl + 2; i++) {
                balls.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: Math.random() * (canvas.height / 2),
                    r: 12,
                    color: `hsl(${Math.random() * 360}, 70%, 50%)`,
                    dx: 0, dy: 0
                });
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('lvs').innerText = lives;
            document.getElementById('cns').innerText = coins;
            document.getElementById('lvl').innerText = currentLevel;
        }

        function handleRetry() {
            window.open(LINK_1, '_blank');
            location.reload();
        }

        function handleFreeLife() {
            window.open(LINK_2, '_blank');
            lives = 1;
            isPaused = false;
            document.getElementById('gameOverModal').style.display = 'none';
            updateUI();
            speak("Karibu tena! Una maisha moja.");
        }

        canvas.addEventListener('mousedown', (e) => {
            if (isPaused) return;
            const rect = canvas.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;
            if (Math.hypot(startX - balls[0].x, startY - balls[0].y) < 30) {
                isDragging = true;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('mouseup', (e) => {
            if (!isDragging) return;
            const rect = canvas.getBoundingClientRect();
            let endX = e.clientX - rect.left;
            let endY = e.clientY - rect.top;
            balls[0].dx = (startX - endX) * 0.12;
            balls[0].dy = (startY - endY) * 0.12;
            isDragging = false;
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Pockets
            const pockets = [[0,0], [canvas.width/2,0], [canvas.width,0], [0,canvas.height], [canvas.width/2,canvas.height], [canvas.width,canvas.height]];
            ctx.fillStyle = "#111";
            pockets.forEach(p => {
                ctx.beginPath();
                ctx.arc(p[0], p[1], 20, 0, Math.PI*2);
                ctx.fill();
            });

            // Aim Line
            if (isDragging) {
                ctx.beginPath();
                ctx.moveTo(balls[0].x, balls[0].y);
                ctx.lineTo(mouseX, mouseY);
                ctx.strokeStyle = "white";
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // Physics & Drawing Balls
            for (let i = 0; i < balls.length; i++) {
                let b = balls[i];
                if (!isPaused) {
                    b.x += b.dx; b.y += b.dy;
                    b.dx *= 0.985; b.dy *= 0.985;

                    if (b.x < b.r || b.x > canvas.width - b.r) b.dx *= -0.8;
                    if (b.y < b.r || b.y > canvas.height - b.r) b.dy *= -0.8;

                    pockets.forEach(p => {
                        if (Math.hypot(b.x - p[0], b.y - p[1]) < 20) {
                            if (b.color === 'white') {
                                b.x = 180; b.y = 400; b.dx = 0; b.dy = 0;
                                lives--; updateUI();
                                speak("Faulo!");
                                if (lives <= 0) {
                                    isPaused = true;
                                    document.getElementById('gameOverText').innerText = `Level: ${currentLevel} | Coins: ${coins}`;
                                    document.getElementById('gameOverModal').style.display = 'flex';
                                }
                            } else {
                                balls.splice(i, 1);
                                coins += 50; updateUI();
                                if (balls.length === 1) {
                                    currentLevel++;
                                    speak("Level mpya!");
                                    initLevel(currentLevel);
                                }
                            }
                        }
                    });

                    for (let j = i + 1; j < balls.length; j++) {
                        let b2 = balls[j];
                        let dist = Math.hypot(b2.x - b.x, b2.y - b.y);
                        if (dist < b.r + b2.r) {
                            let angle = Math.atan2(b2.y - b.y, b2.x - b.x);
                            let tempDx = b.dx; let tempDy = b.dy;
                            b.dx = b2.dx * 0.8; b.dy = b2.dy * 0.8;
                            b2.dx = tempDx * 0.8; b2.dy = tempDy * 0.8;
                        }
                    }
                }
                ctx.fillStyle = b.color;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
                ctx.fill();
            }
            requestAnimationFrame(draw);
        }

        initLevel(1);
        draw();
    </script>
</body>
</html>
