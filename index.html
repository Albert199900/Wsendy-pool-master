<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wsendy Pool: Billionaire Infinity</title>
    <style>
        body { font-family: 'Arial Black', sans-serif; background: #000; color: white; text-align: center; margin: 0; overflow: hidden; user-select: none; }
        .header { background: linear-gradient(135deg, #1e8449, #145a32); padding: 12px; border-bottom: 4px solid #f1c40f; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .stats-grid { display: flex; justify-content: space-around; background: #1a1a1a; padding: 10px; color: #f1c40f; font-size: 13px; border-bottom: 2px solid #333; }
        
        /* Welcome & Shop Screens */
        #welcomeScreen, #shopModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1e8449, #000); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #shopModal { background: rgba(0,0,0,0.95); display: none; z-index: 2500; }
        .input-name { padding: 15px; border-radius: 10px; border: 2px solid gold; width: 250px; text-align: center; font-size: 18px; margin-bottom: 15px; outline: none; }

        .game-area { position: relative; display: inline-block; background: #3d251e; padding: 12px; border-radius: 20px; margin-top: 10px; box-shadow: 0 15px 50px rgba(0,0,0,0.9); }
        canvas { border-radius: 12px; touch-action: none; display: block; border: 4px solid #1e8449; transition: background 0.5s; }
        
        .ui { margin-top: 5px; width: 360px; display: inline-block; }
        .mrembo-box { display: flex; align-items: center; background: rgba(255, 255, 255, 0.08); padding: 12px; border-radius: 20px; border: 1px solid #f1c40f; }
        .mrembo-img { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #f1c40f; transition: 0.3s; }
        .shield-active { box-shadow: 0 0 25px #00fbff; border-color: #00fbff; transform: scale(1.1); }
        
        .btn-main { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 14px; color: white; background: linear-gradient(to bottom, #f39c12, #d35400); box-shadow: 0 5px 0 #873600; margin-top: 10px; text-transform: uppercase; }
        .btn-share { background: linear-gradient(to bottom, #25d366, #128c7e); box-shadow: 0 5px 0 #075e54; }
        .btn-shop { background: #444; box-shadow: 0 5px 0 #222; }
        
        #powerBar { width: 0%; height: 8px; background: linear-gradient(to right, #2ecc71, #f1c40f, #e74c3c); margin-bottom: 5px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="welcomeScreen">
        <h1 style="color: gold; text-shadow: 2px 2px #000;">WSENDY POOL 🎱</h1>
        <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=150" style="width: 100px; border-radius: 50%; border: 3px solid gold; margin-bottom: 20px;">
        <input type="text" id="playerNameInput" class="input-name" placeholder="Andika Jina Lako...">
        <button class="btn-main" onclick="startGame()" style="width: 250px;">ANZA USHINDI 🚀</button>
    </div>

    <div id="shopModal">
        <h2 style="color: gold;">LUXURY SHOP 💎</h2>
        <button class="btn-main" onclick="buyTable('#27ae60', 0)" style="background:#27ae60; width:250px;">KIJANI (BURE)</button>
        <button class="btn-main" onclick="buyTable('#2980b9', 2000)" style="background:#2980b9; width:250px;">BLUU (2,000💰)</button>
        <button class="btn-main" onclick="buyTable('#c0392b', 5000)" style="background:#c0392b; width:250px;">NYEKUNDU (5,000💰)</button>
        <button class="btn-main" onclick="buyTable('#8e44ad', 10000)" style="background:#8e44ad; width:250px;">ZAMBARAU (10,000💰)</button>
        <button class="btn-main btn-shop" onclick="toggleShop()" style="width:250px;">FUNGA</button>
    </div>

    <div class="header">🌍 WSENDY POOL: BILLIONAIRE 🌍</div>

    <div class="stats-grid">
        <span>LVL: <span id="lvl">1</span></span>
        <span>💰 <span id="coins">100</span></span>
        <span style="color:#e74c3c">❤️ <span id="lives">3</span></span>
    </div>

    <div class="game-area">
        <div id="powerBar"></div>
        <canvas id="poolCanvas" width="350" height="200"></canvas>
    </div>

    <div class="ui">
        <div class="mrembo-box">
            <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=150" class="mrembo-img" id="mremboImg">
            <div id="status" style="margin-left:15px; font-size:12px; color:#f1c40f; text-align:left; font-weight:bold;">"Karibu! Sambaza mchezo nikupe zawadi ya Shield!"</div>
        </div>
        <button class="btn-main btn-share" onclick="shareAndVerify()">📢 SHARE WHATSAPP (+1,000💰 & 🛡️)</button>
        <button class="btn-main" onclick="watchAds()">📺 PATA MAISHA & COINS (ADS)</button>
        <button class="btn-main btn-shop" onclick="toggleShop()">🛒 LUXURY SHOP</button>
    </div>

    <script>
        const canvas = document.getElementById('poolCanvas');
        const ctx = canvas.getContext('2d');
        const clackSound = new Audio('https://www.soundjay.com/misc/sounds/billiard-ball-clack-1.mp3');
        const adLink = "https://www.your-adsterra-link.com"; // WEKA LINK YAKO HAPA

        let level = 1, lives = 3, coins = 100, adCounter = 0;
        let playerName = "Bingwa", hasShield = false, isDragging = false, mouseX, mouseY;
        let balls = [], tableColor = '#27ae60', shareStartTime;

        function triggerVibration(d) { if (navigator.vibrate) navigator.vibrate(d); }

        function startGame() {
            let input = document.getElementById('playerNameInput').value;
            if (input.trim() !== "") playerName = input;
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('status').innerText = `"Hujambo ${playerName}! Twende kazi!"`;
            initLevel(1);
        }

        function toggleShop() {
            const s = document.getElementById('shopModal');
            s.style.display = (s.style.display === 'none' || s.style.display === '') ? 'flex' : 'none';
        }

        function buyTable(color, price) {
            if (coins >= price) {
                coins -= price; tableColor = color;
                canvas.style.background = `radial-gradient(circle, ${color}, #000)`;
                updateUI(); toggleShop();
                document.getElementById('status').innerText = `"Umependeza sana na meza hii ${playerName}!"`;
            } else { alert("Coins hazitoshi! Angalia Ads upate coins."); }
        }

        function shareAndVerify() {
            shareStartTime = Date.now();
            const shareText = `Mkuu, cheza game hili la Pool upate siri za mrembo! Link: ${window.location.href}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(shareText)}`, '_blank');
            window.onfocus = function() {
                if ((Date.now() - shareStartTime) / 1000 > 4) {
                    coins += 1000; hasShield = true;
                    document.getElementById('mremboImg').classList.add('shield-active');
                    document.getElementById('status').innerHTML = "<b>ZAWADI!</b> ✅ 1,000💰 & Shield vimeongezwa!";
                    updateUI(); triggerVibration([100, 50, 100]);
                    window.onfocus = null;
                }
            };
        }

        function watchAds() {
            window.open(adLink, '_blank');
            adCounter++;
            if(adCounter >= 3) { adCounter = 0; lives = 5; coins += 500; alert("Hongera! Umepata Maisha na Coins."); }
            updateUI();
        }

        function initLevel(l) {
            balls = [{x:80, y:100, r:10, c:'white', dx:0, dy:0}];
            if(l === 1) balls.push({x:240, y:100, r:10, c:'red', dx:0, dy:0}, {x:265, y:100, r:10, c:'yellow', dx:0, dy:0});
            else for(let i=0; i<Math.min(l, 8); i++) balls.push({x:200+(i*15), y:50+(i*15), r:10, c:`hsl(${i*45}, 70%, 50%)`, dx:0, dy:0});
            updateUI();
        }

        function updateUI() {
            document.getElementById('coins').innerText = coins;
            document.getElementById('lives').innerText = lives;
            document.getElementById('lvl').innerText = level;
        }

        canvas.onmousedown = (e) => { 
            const r = canvas.getBoundingClientRect();
            if(Math.hypot(e.clientX-r.left-balls[0].x, e.clientY-r.top-balls[0].y) < 25) isDragging = true;
        };

        canvas.onmousemove = (e) => {
            const r = canvas.getBoundingClientRect();
            mouseX = e.clientX-r.left; mouseY = e.clientY-r.top;
            if(isDragging) document.getElementById('powerBar').style.width = Math.min(Math.hypot(mouseX-balls[0].x, mouseY-balls[0].y), 100) + "%";
        };

        canvas.onmouseup = () => {
            if(!isDragging) return;
            balls[0].dx = (balls[0].x - mouseX) * 0.22; balls[0].dy = (balls[0].y - mouseY) * 0.22;
            isDragging = false; document.getElementById('powerBar').style.width = "0%";
        };

        const pockets = [{x:0,y:0}, {x:175,y:0}, {x:350,y:0}, {x:0,y:200}, {x:175,y:200}, {x:350,y:200}];

        function draw() {
            ctx.fillStyle = tableColor; ctx.fillRect(0, 0, 350, 200);
            pockets.forEach(p => { ctx.fillStyle="#000"; ctx.beginPath(); ctx.arc(p.x, p.y, 16, 0, 7); ctx.fill(); });

            balls.forEach((b, i) => {
                b.x += b.dx; b.y += b.dy; b.dx *= 0.985; b.dy *= 0.985;
                if(b.x<10 || b.x>340) b.dx*=-1; if(b.y<10 || b.y>190) b.dy*=-1;

                pockets.forEach(p => {
                    if(Math.hypot(b.x-p.x, b.y-p.y) < 16) {
                        if(b.c === 'white') { 
                            if(hasShield) { hasShield = false; document.getElementById('mremboImg').classList.remove('shield-active'); }
                            else lives--;
                            b.x=80; b.y=100; b.dx=0; b.dy=0; 
                        } else { balls.splice(i,1); coins += 50; if(balls.length === 1) { level++; initLevel(level); window.open(adLink, '_blank'); } }
                        updateUI();
                        if(lives<=0) { alert("Game Over! Jaribu tena."); location.reload(); }
                    }
                });

                for(let j=i+1; j<balls.length; j++) {
                    let b2 = balls[j];
                    if(Math.hypot(b.x-b2.x, b.y-b2.y) < 20) {
                        clackSound.play(); triggerVibration(30);
                        let tx = b.dx, ty = b.dy; b.dx = b2.dx; b.dy = b2.dy; b2.dx = tx; b2.dy = ty;
                    }
                }
                ctx.fillStyle=b.c; ctx.beginPath(); ctx.arc(b.x,b.y,10,0,7); ctx.fill();
                if(b.c !== 'white') { ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(b.x,b.y,5,0,7); ctx.fill(); }
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
