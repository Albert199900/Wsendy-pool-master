  <!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wsendy Pool: Elite Realistic Build</title>
    <style>
        :root { --gold: #f1c40f; --green: #2ecc71; --dark: #000; --card-bg: rgba(15, 15, 15, 0.98); }
        body { font-family: 'Arial Black', sans-serif; background: var(--dark); color: white; text-align: center; margin: 0; overflow: hidden; user-select: none; transition: 0.5s; background-size: cover; background-position: center; }
        
        .top-nav { display: flex; justify-content: space-around; padding: 12px; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--gold); position: relative; z-index: 10; }
        .stat-box { background: #000; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 12px; font-weight: bold; color: var(--gold); font-size: 13px; box-shadow: 0 0 10px rgba(241, 196, 15, 0.2); }

        canvas { border: 6px solid #3d251e; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.9); margin-top: 15px; position: relative; z-index: 5; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .panel { background: var(--card-bg); border: 2px solid var(--gold); border-radius: 25px; width: 320px; padding: 20px; max-height: 85vh; overflow-y: auto; box-shadow: 0 0 30px rgba(241, 196, 15, 0.2); backdrop-filter: blur(5px); }

        .shop-header { display: flex; justify-content: space-between; background: #000; padding: 10px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 15px; }
        
        /* Realistic Metal Button Effect */
        .btn-elite { width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; transition: 0.3s;
            background: linear-gradient(to bottom, #f39c12 0%, #d35400 100%);
            box-shadow: inset 0 2px 2px rgba(255,255,255,0.3), inset 0 -2px 2px rgba(0,0,0,0.2), 0 5px 0 #873600, 0 8px 15px rgba(211, 84, 0, 0.4); }
        .btn-elite:active { transform: translateY(3px); box-shadow: inset 0 2px 2px rgba(255,255,255,0.3), inset 0 -2px 2px rgba(0,0,0,0.2), 0 2px 0 #873600; }
        
        .btn-upload { background: #3498db; border: 2px dashed white; }
        .btn-green { background: linear-gradient(to bottom, #2ecc71 0%, #27ae60 100%); box-shadow: 0 5px 0 #1e8449, 0 8px 15px rgba(46, 204, 113, 0.4); }
        .btn-secondary { background: #333; box-shadow: none; border: 1px solid #555; }
        .btn-close { background: #e74c3c; width: 100%; padding: 10px; border: none; border-radius: 10px; color: white; margin-top: 10px; font-weight: bold; }

        .level-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        
        /* Realistic Wheel with Textured Segments */
        .wheel-box { position: relative; width: 220px; height: 220px; border: 8px solid var(--gold); border-radius: 50%; background: conic-gradient(#e74c3c 0deg 72deg, #3498db 72deg 144deg, #f1c40f 144deg 216deg, #2ecc71 216deg 288deg, #9b59b6 288deg 360deg); transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); box-shadow: 0 0 20px var(--gold); }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid white; z-index: 100; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }

        #powerIndicator { width: 0%; height: 8px; background: linear-gradient(to right, #2ecc71, #f1c40f, #e74c3c); margin-bottom: 5px; border-radius: 4px; max-width: 350px; }
        #bgUpload { display: none; }
    </style>
</head>
<body id="gameBody">

    <div id="welcomeScreen" class="overlay" style="display: flex;">
        <div class="panel">
            <h1 style="color: gold; text-shadow: 2px 2px #000; margin: 0;">WSENDY POOL</h1>
            <p style="font-size: 11px; letter-spacing: 2px;">ELITE REALISTIC BUILD</p>
            <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=150" style="width: 100px; border-radius: 50%; border: 3px solid gold; margin: 20px 0;">
            <input type="text" id="playerNameInput" style="padding:15px; border-radius:10px; border:1px solid gold; width:220px; text-align:center; background:#000; color:white; outline:none;" placeholder="Andika Jina Lako...">
            <button class="btn-elite" onclick="saveName()" style="width: 250px;">ANZA USHINDI 🚀</button>
        </div>
    </div>

    <div id="gameMenu" class="overlay">
        <div class="panel">
            <h2 style="color: var(--gold);">MAIN MENU</h2>
            <button class="btn-elite" onclick="showLevelMap()">🏆 QUEST MODE</button>
            <button class="btn-elite btn-secondary" onclick="startFreeMode()">💰 FREE MODE</button>
            <button class="btn-elite btn-green" onclick="openSpin()">🎡 LUCKY SPIN</button>
            <button class="btn-elite btn-secondary" onclick="toggleShop()">🛒 SHOP & HOME</button>
        </div>
    </div>

    <div id="spinModal" class="overlay">
        <div class="panel">
            <h2 style="color: var(--gold);">LUCKY SPIN</h2>
            <div style="position:relative; margin: 20px;">
                <div class="pointer"></div>
                <div id="wheel" class="wheel-box"></div>
            </div>
            <button id="spinBtn" class="btn-elite" onclick="startSpin()">ZUNGUSHA! 🚀</button>
            <button class="btn-elite btn-secondary" onclick="closeSpin()">FUNGA</button>
        </div>
    </div>

    <div id="shopModal" class="overlay">
        <div class="panel">
            <h2 style="color:var(--gold); margin-top:0;">HOME & SHOP</h2>
            
            <div class="shop-header">
                <span style="color:var(--gold)">💰 <span id="shopCoins">600</span></span>
                <span style="color:#ff4d4d">❤️ <span id="shopLives">3</span></span>
            </div>

            <label for="bgUpload" class="btn-elite btn-upload" style="display: block; text-align: center;">Pakia Background Picha Yako 📸</label>
            <input type="file" id="bgUpload" accept="image/*" onchange="handleUpload(event)">
            <p style="font-size: 10px; color:#aaa; margin-top:-5px;">Mrembo ataisifia!</p>

            <button class="btn-elite" style="background:linear-gradient(to right, #2c3e50, #000)" onclick="buyHome('villa', 5000)">🏡 VILLA YA MILIONEA (5,000💰)</button>
            <button class="btn-elite" style="background:linear-gradient(to right, #8e44ad, #2980b9)" onclick="buyHome('club', 3000)">🎶 NIGHT CLUB VIP (3,000💰)</button>
            
            <p style="font-size: 11px; margin-top:15px;">RANGI ZA MEZA</p>
            <button class="btn-elite btn-secondary" style="border-color:#2ecc71" onclick="buyTable('#27ae60', 0)">🟢 KIJANI (BURE)</button>
            <button class="btn-elite btn-secondary" style="border-color:#2980b9" onclick="buyTable('#2980b9', 2000)">🔵 BLUU (2,000💰)</button>
            <button class="btn-elite btn-secondary" style="border-color:#c0392b" onclick="buyTable('#c0392b', 5000)">🔴 NYEKUNDU (5,000💰)</button>
            <button class="btn-elite btn-secondary" style="border-color:#8e44ad" onclick="buyTable('#8e44ad', 10000)">🟣 ZAMBARAU (10,000💰)</button>
            
            <button class="btn-close" onclick="closePanels()">RUDI KWENYE GAME</button>
        </div>
    </div>

    <div id="levelMap" class="overlay">
        <div class="panel">
            <h2 style="color:var(--gold)">CHAGUA LEVEL</h2>
            <div class="level-grid" id="lvlButtons">
                </div>
            <button class="btn-close" onclick="closePanels()">FUNGA</button>
        </div>
    </div>

    <div class="top-nav">
        <div class="stat-box" onclick="openPanel('shop')">🛒 SHOP & HOME</div>
        <div class="stat-box">💰 <span id="mainCoins">600</span></div>
        <div class="stat-box" style="color:#ff4d4d; border-color:#ff4d4d;">❤️ <span id="mainLives">3</span></div>
        <div class="stat-box" onclick="openPanel('levels')">🏆 LEVEL <span id="lvlDisp">1</span></div>
    </div>

    <div id="gameArea">
        <div id="powerIndicator"></div>
        <canvas id="poolCanvas" width="350" height="200"></canvas>
    </div>

    <div style="padding: 10px; z-index: 10; position: relative;">
        <button class="btn-elite btn-green" onclick="watchAd()">📺 PATA 500 COINS (AD)</button>
    </div>

    <script>
        const canvas = document.getElementById('poolCanvas');
        const ctx = canvas.getContext('2d');
        const body = document.getElementById('gameBody');

        function preLoadSauti(url) {
            const s = new Audio(url); s.preload = 'auto'; return s;
        }

        const clackSound = preLoadSauti('https://www.soundjay.com/misc/sounds/billiard-ball-clack-1.mp3');
        const coinSound = preLoadSauti('https://www.soundjay.com/misc/sounds/coin-drop-1.mp3');
        const winSound = preLoadSauti('https://www.soundjay.com/misc/sounds/win-fntsy-1.mp3');

        function mremboSema(txt) {
            const s = new SpeechSynthesisUtterance(txt);
            s.lang = 'sw-TZ';
            window.speechSynthesis.speak(s);
        }

        let coins = parseInt(localStorage.getItem("wCoins")) || 600;
        let lives = parseInt(localStorage.getItem("wLives")) || 3;
        let unlockedLevels = parseInt(localStorage.getItem("unlockedLevels")) || 1;
        let level = 1, tableColor = "#27ae60", isDragging = false;
        let balls = [], currentMode = "quest", mouseX, mouseY;
        let power = 0;

        function saveName() {
            const name = document.getElementById('playerNameInput').value;
            if (name.trim() !== "") localStorage.setItem("wPlayerName", name);
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('gameMenu').style.display = 'flex';
            winSound.play();
        }

        function toggleShop() {
            const s = document.getElementById('shopModal');
            s.style.display = (s.style.display === 'none') ? 'flex' : 'none';
        }

        function buyTable(color, price) {
            if (coins >= price) { 
                coins -= price; tableColor = color; 
                canvas.style.background = `radial-gradient(circle, ${color}, #000)`;
                updateUI(); toggleShop(); winSound.play();
            } else { alert("Angalia Ads upate coins!"); }
        }

        function handleUpload(event) {
            const reader = new FileReader();
            reader.onload = function() {
                body.style.backgroundImage = `url('${reader.result}')`;
                mremboSema("Wow! Background yako inapendeza sana mkuu.");
                closePanels();
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function buyHome(type, price) {
            if (coins >= price) {
                coins -= price;
                if(type === 'villa') body.style.backgroundImage = "url('https://images.unsplash.com/photo-1613490493576-7fde63acd811?w=800')";
                if(type === 'club') body.style.backgroundImage = "url('https://images.unsplash.com/photo-1566737236500-c8ac43014a67?w=800')";
                updateUI();
                mremboSema("Hongera kwa kununua nyumba mpya!");
                closePanels();
            } else { mremboSema("Pesa haitoshi."); alert("Coins hazitoshi!"); }
        }

        function openSpin() { document.getElementById('spinModal').style.display = 'flex'; }
        function closeSpin() { document.getElementById('spinModal').style.display = 'none'; }
        function startSpin() {
            const wheel = document.getElementById('wheel');
            const deg = Math.floor(Math.random() * 360) + 1800;
            wheel.style.transform = `rotate(${deg}deg)`;
            document.getElementById('spinBtn').disabled = true;
            setTimeout(() => {
                const prize = [1000, 200, 5000, 500, 100][Math.floor(Math.random()*5)];
                coins += prize; coinSound.play();
                alert("HONGERA! Umeshinda 💰 " + prize);
                updateUI(); closeSpin(); document.getElementById('spinBtn').disabled = false;
            }, 4000);
        }

        function showLevelMap() {
            document.getElementById('levelMap').style.display = 'flex';
            const grid = document.getElementById('lvlButtons');
            grid.innerHTML = '';
            for (let i = 1; i <= 8; i++) {
                const btn = document.createElement('button');
                btn.className = 'stat-box'; btn.style.padding = '15px';
                btn.innerText = (i <= unlockedLevels) ? i : '🔒';
                if(i <= unlockedLevels) btn.onclick = () => { level = i; startQuest(); };
                grid.appendChild(btn);
            }
        }

        function startQuest() {
            document.getElementById('levelMap').style.display = 'none';
            document.getElementById('gameMenu').style.display = 'none';
            document.getElementById('lvlDisp').innerText = level;
            initLevel(level);
        }

        function startFreeMode() {
            document.getElementById('gameMenu').style.display = 'none';
            document.getElementById('lvlDisp').innerText = "FREE";
            currentMode = "free"; initLevel(1);
        }

        function watchAd() {
            window.open('https://oddlystudent.com/tu1ixct1?key=bf9ebe5967e8fa09c93394892db398f0', '_blank');
            coins += 500; updateUI(); mremboSema("Asante!");
        }

        function openPanel(p) {
            document.getElementById('uiOverlay').style.display = 'flex';
            document.getElementById('shopPanel').style.display = p === 'shop' ? 'block' : 'none';
            document.getElementById('levelPanel').style.display = p === 'levels' ? 'block' : 'none';
            if(p === 'levels') showLevelMap();
            updateUI();
        }
        function closePanels() { document.getElementById('uiOverlay').style.display = 'none'; }
        function backToMenu() {
            document.getElementById('levelMap').style.display = 'none';
            document.getElementById('gameMenu').style.display = 'flex';
        }

        function updateUI() {
            document.getElementById('mainCoins').innerText = coins;
            document.getElementById('mainLives').innerText = lives;
            document.getElementById('shopCoins').innerText = coins;
            document.getElementById('shopLives').innerText = lives;
            localStorage.setItem("wCoins", coins);
            localStorage.setItem("wLives", lives);
            localStorage.setItem("unlockedLevels", unlockedLevels);
        }

        function initLevel(l) {
            balls = [{x:80, y:100, r:10, c:'white', dx:0, dy:0}];
            let count = (currentMode === "quest") ? l + 1 : 6;
            for(let i=0; i<count; i++) balls.push({x:200+(i*12), y:60+(i*15), r:10, c:`hsl(${i*50},70%,50%)`, dx:0, dy:0});
        }

        canvas.onmousedown = (e) => { isDragging = true; };
        canvas.onmousemove = (e) => {
            const r = canvas.getBoundingClientRect();
            let mouseX = e.clientX-r.left, mouseY = e.clientY-r.top;
            if(isDragging) {
                power = Math.min(Math.hypot(mouseX-balls[0].x, mouseY-balls[0].y), 100);
                document.getElementById('powerIndicator').style.width = power + "%";
            }
        };
        canvas.onmouseup = (e) => {
            if(!isDragging) return;
            const r = canvas.getBoundingClientRect();
            balls[0].dx = (balls[0].x - (e.clientX-r.left)) * 0.2;
            balls[0].dy = (balls[0].y - (e.clientY-r.top)) * 0.2;
            isDragging = false; document.getElementById('powerIndicator').style.width = "0%";
            clackSound.play();
        };

        // Realistic Drawing (Sphere Gradients)
        function drawRealisticBall(ctx, x, y, radius, color) {
            if(color === 'white') {
                ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(x,y,radius,0,7); ctx.fill();
                return;
            }
            // Diffuse Shadow Grad
            let shadowGrad = ctx.createRadialGradient(x,y,0, x,y,radius);
            shadowGrad.addColorStop(0, color);
            shadowGrad.addColorStop(1, '#000');
            ctx.fillStyle = shadowGrad;
            ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fill();

            // Specular Highlight (Doa la Mwanga)
            let lightGrad = ctx.createRadialGradient(x-radius/3, y-radius/3, 0, x-radius/3, y-radius/3, radius*0.7);
            lightGrad.addColorStop(0, 'white');
            lightGrad.addColorStop(0.3, 'rgba(255,255,255,0.5)');
            lightGrad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = lightGrad;
            ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fill();
        }

        function draw() {
            // Table Felt (Realistic Felt Texture Effect)
            ctx.fillStyle = tableColor; 
            ctx.beginPath(); ctx.roundRect(0, 0, 350, 200, 15); ctx.fill();
            let feltGrad = ctx.createLinearGradient(0,0,0,200);
            feltGrad.addColorStop(0, 'rgba(0,0,0,0)');
            feltGrad.addColorStop(1, 'rgba(0,0,0,0.15)');
            ctx.fillStyle = feltGrad; ctx.fillRect(0, 0, 350, 200);

 pocket locations
            [[0,0],[175,0],[350,0],[0,200],[175,200],[350,200]].forEach(p => {
                ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(p[0], p[1], 16, 0, 7); ctx.fill();
            });

            if (isDragging) {
                ctx.save(); ctx.translate(balls[0].x, balls[0].y);
                ctx.rotate(Math.atan2(mouseY-balls[0].y, mouseX-balls[0].x));
                // Real Wood Cue Grad
                let woodGrad = ctx.createLinearGradient(40,-3,180,-3);
                woodGrad.addColorStop(0, '#f1c40f'); // gold tip
                woodGrad.addColorStop(0.1, '#3d251e'); // dark wood
                woodGrad.addColorStop(0.5, '#7e5a32'); // light wood
                woodGrad.addColorStop(1, '#3d251e'); // dark wood base
                ctx.fillStyle = woodGrad; ctx.fillRect(40, -3, 140, 6);
                ctx.restore();
            }

            balls.forEach((b, i) => {
                b.x += b.dx; b.y += b.dy; b.dx *= 0.985; b.dy *= 0.985;
                if(b.x<10 || b.x>340) { b.dx*=-1; }
                if(b.y<10 || b.y>190) { b.dy*=-1; }
                
                // Pocket check
                if((b.x<20 || b.x>330) && (b.y<20 || b.y>180)) {
                    if(b.c==='white') { b.x=80; b.y=100; b.dx=0; b.dy=0; lives--; mremboSema("Hiyo ni faulo mkuu!"); }
                    else { 
                        balls.splice(i,1); coins+=50; coinSound.play();
                        if(balls.length===1) {
                            if(currentMode==="quest") {
                                if(level === unlockedLevels && unlockedLevels < 8) unlockedLevels++;
                                winSound.play(); showLevelMap(); mremboSema("Hongera kwa ushindi mkuu!");
                            } else { level++; initLevel(level); }
                        }
                    }
                    updateUI(); if(lives<=0) { alert("GAME OVER!"); location.reload(); localStorage.setItem("wLives", 3); }
                }

                drawRealisticBall(ctx, b.x, b.y, b.r, b.c);

                for (let j = i+1; j < balls.length; j++) {
                    let b2 = balls[j];
                    if (Math.hypot(b.x-b2.x, b.y-b2.y) < 20) {
                        let tx = b.dx, ty = b.dy; b.dx = b2.dx; b.dy = b2.dy; b2.dx = tx; b2.dy = ty;
                        clackSound.play(); if(navigator.vibrate) navigator.vibrate(20);
                    }
                }
            });
            requestAnimationFrame(draw);
        }

        if(localStorage.getItem("wPlayerName")) { document.getElementById('welcomeScreen').style.display = 'none'; }
        initLevel(1); draw(); updateUI();
    </script>
</body>
</html>
