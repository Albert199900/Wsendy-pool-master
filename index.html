<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wsendy Pool: Ultimate Clubs & Ads Build</title>
    <style>
        :root { --gold: #f1c40f; --green: #2ecc71; --dark: #000; --card-bg: rgba(15, 15, 15, 0.95); }
        body { font-family: 'Arial', sans-serif; background: var(--dark); color: white; text-align: center; margin: 0; overflow: hidden; user-select: none; transition: 0.5s; background-size: cover; background-position: center; background-attachment: fixed; }
        
        .top-nav { display: flex; justify-content: space-around; padding: 12px 5px; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--gold); position: relative; z-index: 10; align-items: center; }
        .stat-box { background: #000; border: 1px solid var(--gold); padding: 6px 10px; border-radius: 10px; font-weight: bold; color: var(--gold); font-size: 12px; box-shadow: 0 0 10px rgba(241, 196, 15, 0.2); cursor: pointer; }

        canvas { width: 96vw; max-width: 800px; aspect-ratio: 7/4; border: 12px solid #5c3a21; border-radius: 15px; box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 20px 40px rgba(0,0,0,0.9); margin-top: 15px; position: relative; z-index: 5; touch-action: none; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .panel { background: var(--card-bg); border: 2px solid var(--gold); border-radius: 20px; width: 310px; padding: 20px; max-height: 85vh; overflow-y: auto; box-shadow: 0 0 30px rgba(241, 196, 15, 0.3); backdrop-filter: blur(8px); }

        .shop-header { display: flex; justify-content: space-between; background: #000; padding: 10px; border-radius: 12px; border: 1px solid var(--gold); margin-bottom: 15px; }
        
        .btn-elite { width: 100%; padding: 14px; margin: 6px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; transition: 0.2s; background: linear-gradient(to bottom, #f39c12 0%, #d35400 100%); box-shadow: inset 0 2px 2px rgba(255,255,255,0.3), inset 0 -2px 2px rgba(0,0,0,0.2), 0 4px 0 #873600, 0 8px 15px rgba(211, 84, 0, 0.4); }
        .btn-elite:active { transform: translateY(3px); box-shadow: 0 1px 0 #873600; }
        
        .btn-upload { background: #3498db; border: 2px dashed white; display: block; text-align: center; }
        .btn-green { background: linear-gradient(to bottom, #2ecc71 0%, #27ae60 100%); box-shadow: 0 4px 0 #1e8449; }
        .btn-blue { background: linear-gradient(to bottom, #3498db 0%, #2980b9 100%); box-shadow: 0 4px 0 #1c5980; }
        .btn-secondary { background: #333; box-shadow: 0 4px 0 #111; border: 1px solid #555; }
        .btn-close { background: #e74c3c; width: 100%; padding: 10px; border: none; border-radius: 8px; color: white; margin-top: 10px; font-weight: bold; }

        .level-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        
        .wheel-box { position: relative; width: 200px; height: 200px; border: 6px solid var(--gold); border-radius: 50%; background: conic-gradient(#e74c3c 0deg 72deg, #3498db 72deg 144deg, #f1c40f 144deg 216deg, #2ecc71 216deg 288deg, #9b59b6 288deg 360deg); transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); box-shadow: 0 0 20px var(--gold); margin: 0 auto; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 25px solid white; z-index: 100; filter: drop-shadow(0 0 5px rgba(0,0,0,0.8)); }

        #powerIndicator { width: 0%; height: 6px; background: linear-gradient(to right, #2ecc71, #f1c40f, #e74c3c); margin-bottom: 5px; border-radius: 3px; width: 96vw; max-width: 800px; margin-left: auto; margin-right: auto; }
        #bgUpload { display: none; }
        
        /* Custom scrollbar for Shop Panel */
        .panel::-webkit-scrollbar { width: 8px; }
        .panel::-webkit-scrollbar-track { background: #111; border-radius: 4px; }
        .panel::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }
    </style>
</head>
<body id="gameBody">

    <div id="welcomeScreen" class="overlay" style="display: flex;">
        <div class="panel">
            <h1 style="color: gold; margin: 0;">WSENDY POOL</h1>
            <p style="font-size: 11px; color: #ccc;">BILLIONAIRE EDITION</p>
            <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=150" style="width: 100px; border-radius: 50%; border: 3px solid gold; margin: 15px 0;">
            <input type="text" id="playerNameInput" style="padding:12px; border-radius:8px; border:1px solid gold; width:220px; text-align:center; background:#000; color:white; outline:none; margin-bottom: 10px;" placeholder="Ingiza Jina Lako...">
            <button class="btn-elite" onclick="saveName()">ANZA MCHEZO 🚀</button>
            <button class="btn-elite btn-secondary" onclick="skipName()">RUKA (SKIP) ⏭️</button>
        </div>
    </div>

    <div id="gameMenu" class="overlay">
        <div class="panel">
            <h2 style="color: var(--gold);">MENU KUU</h2>
            <button class="btn-elite" onclick="showLevelMap()">🏆 QUEST MODE</button>
            <button class="btn-elite btn-secondary" onclick="startFreeMode()">💰 FREE MODE</button>
            <button class="btn-elite btn-green" onclick="openSpin()">🎡 LUCKY SPIN</button>
            <button class="btn-elite btn-secondary" onclick="openPanel('shop')">🛒 SHOP & CLUBS</button>
        </div>
    </div>

    <div id="pauseMenu" class="overlay">
        <div class="panel">
            <h2 style="color: var(--gold);">⏸ PAUSED</h2>
            <button class="btn-elite" onclick="togglePause()">▶ ENDELEA</button>
            <button class="btn-elite btn-secondary" onclick="openPanel('shop'); isPaused = false;">🛒 SHOP & CLUBS</button>
            <button class="btn-elite btn-secondary" onclick="openPanel('levels'); isPaused = false;">🏆 LEVEL MAP</button>
        </div>
    </div>

    <div id="spinModal" class="overlay">
        <div class="panel">
            <h2 style="color: var(--gold);">LUCKY SPIN</h2>
            <div style="position:relative; margin: 25px auto;">
                <div class="pointer"></div>
                <div id="wheel" class="wheel-box"></div>
            </div>
            <button id="spinBtn" class="btn-elite" onclick="startSpin()">ZUNGUSHA! 🚀</button>
            <button class="btn-elite btn-secondary" onclick="closePanels()">FUNGA</button>
        </div>
    </div>

    <div id="shopPanel" class="overlay">
        <div class="panel">
            <h2 style="color:var(--gold); margin-top:0;">HOME & SHOP</h2>
            <div class="shop-header">
                <span style="color:var(--gold)">💰 <span id="shopCoins">600</span></span>
                <span style="color:#ff4d4d">❤️ <span id="shopLives">3</span></span>
            </div>
            
            <label for="bgUpload" class="btn-elite btn-upload">📸 PAKIA PICHA YAKO</label>
            <input type="file" id="bgUpload" accept="image/*" onchange="handleUpload(event)">
            
            <p style="font-size: 11px; margin-top:15px; margin-bottom:5px; color: #aaa;">NUNUA MAZINGIRA (CLUBS/HOMES)</p>
            <button class="btn-elite" style="background:linear-gradient(to right, #4a235a, #000); font-size:11px;" onclick="buyHome('underground', 2000)">🍻 UNDERGROUND CLUB (2,000💰)</button>
            <button class="btn-elite" style="background:linear-gradient(to right, #8e44ad, #2980b9); font-size:11px;" onclick="buyHome('club', 3000)">🎶 NIGHT CLUB VIP (3,000💰)</button>
            <button class="btn-elite" style="background:linear-gradient(to right, #117a65, #000); font-size:11px;" onclick="buyHome('neon', 4000)">🟣 NEON CYBER CLUB (4,000💰)</button>
            <button class="btn-elite" style="background:linear-gradient(to right, #2c3e50, #000); font-size:11px;" onclick="buyHome('villa', 5000)">🏡 VILLA YA VIP (5,000💰)</button>
            <button class="btn-elite" style="background:linear-gradient(to right, #d35400, #f39c12); font-size:11px;" onclick="buyHome('yacht', 8000)">🛥️ BILLIONAIRE YACHT (8,000💰)</button>
            
            <p style="font-size: 11px; margin-top:15px; margin-bottom:5px; color: #aaa;">NUNUA RANGI ZA MEZA</p>
            <button class="btn-elite btn-secondary" style="border-color:#2ecc71" onclick="buyTable('#27ae60', 0)">🟢 KIJANI (BURE)</button>
            <button class="btn-elite btn-secondary" style="border-color:#2980b9" onclick="buyTable('#2980b9', 2000)">🔵 BLUU (2,000💰)</button>
            <button class="btn-elite btn-secondary" style="border-color:#c0392b" onclick="buyTable('#c0392b', 5000)">🔴 NYEKUNDU (5,000💰)</button>
            
            <button class="btn-close" onclick="closePanels()">RUDI KWENYE GAME</button>
        </div>
    </div>

    <div id="levelMap" class="overlay">
        <div class="panel">
            <h2 style="color:var(--gold)">QUEST MAP</h2>
            <div class="level-grid" id="lvlButtons"></div>
            
            <hr style="border: 0.5px solid #333; margin: 15px 0;">
            <p style="font-size: 11px; color: #ccc;">AU FUNGUA LEVEL MPYA BILA KUCHEZA</p>
            <button id="btnUnlockAd" class="btn-elite btn-blue" onclick="watchAdToUnlockLevel()" style="font-size:12px;">🔓 FUNGUA NEXT LEVEL (ADS 0/6)</button>

            <button class="btn-close" onclick="closePanels()">FUNGA</button>
        </div>
    </div>

    <div class="top-nav">
        <div class="stat-box" onclick="openPanel('shop')">🛒 SHOP</div>
        <div class="stat-box" onclick="togglePause()">⏸ PAUSE</div>
        <div class="stat-box">💰 <span id="mainCoins">600</span></div>
        <div class="stat-box" style="color:#ff4d4d; border-color:#ff4d4d;">❤️ <span id="mainLives">3</span></div>
        <div class="stat-box" onclick="openPanel('levels')">🏆 <span id="lvlDisp">L1</span></div>
    </div>

    <div id="gameArea">
        <div id="powerIndicator"></div>
        <canvas id="poolCanvas" width="350" height="200"></canvas>
    </div>

    <div style="padding: 10px; z-index: 10; position: relative;">
        <button class="btn-elite btn-green" onclick="watchAd()">📺 PATA 500 COINS (AD)</button>
    </div>

    <script>
        const canvas = document.getElementById('poolCanvas');
        const ctx = canvas.getContext('2d');
        const body = document.getElementById('gameBody');
        const adLink = "https://oddlystudent.com/tu1ixct1?key=bf9ebe5967e8fa09c93394892db398f0";

        function preLoadSauti(url) { const s = new Audio(url); s.preload = 'auto'; return s; }
        const clackSound = preLoadSauti('https://www.soundjay.com/misc/sounds/billiard-ball-clack-1.mp3');
        const coinSound = preLoadSauti('https://www.soundjay.com/misc/sounds/coin-drop-1.mp3');
        const winSound = preLoadSauti('https://www.soundjay.com/misc/sounds/win-fntsy-1.mp3');

        function playSauti(sauti) { try { let promise = sauti.play(); if(promise !== undefined) promise.catch(e => {}); } catch(e) {} }

        function mremboSema(txt) {
            try {
                const s = new SpeechSynthesisUtterance(txt);
                s.lang = 'sw-TZ'; s.pitch = 1.4; s.rate = 1.0;
                window.speechSynthesis.speak(s);
            } catch(e) {}
        }

        let coins = parseInt(localStorage.getItem("wCoins")) || 600;
        let lives = parseInt(localStorage.getItem("wLives")) || 3;
        let unlockedLevels = parseInt(localStorage.getItem("unlockedLevels")) || 1;
        let adsWatchedForLevel = parseInt(localStorage.getItem("wAdsForLevel")) || 0;
        const MAX_LEVELS = 8;
        let level = 1, tableColor = "#27ae60", isDragging = false, isPaused = false;
        let balls = [], currentMode = "quest", mouseX, mouseY;

        // UI & NAVIGATION
        function saveName() {
            let n = document.getElementById('playerNameInput').value;
            localStorage.setItem("wPlayerName", n.trim() !== "" ? n : "Bingwa");
            fungaWelcomeScreen();
        }
        function skipName() { fungaWelcomeScreen(); }
        function fungaWelcomeScreen() {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('gameMenu').style.display = 'flex';
            playSauti(winSound); mremboSema("Karibu sana mkuu!");
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pauseMenu').style.display = isPaused ? 'flex' : 'none';
        }

        function openPanel(p) {
            isPaused = true; 
            document.getElementById('pauseMenu').style.display = 'none';
            document.getElementById('shopPanel').style.display = p === 'shop' ? 'flex' : 'none';
            document.getElementById('levelMap').style.display = p === 'levels' ? 'flex' : 'none';
            if(p === 'levels') generateLevels();
            updateUI();
        }
        function closePanels() {
            document.getElementById('shopPanel').style.display = 'none';
            document.getElementById('levelMap').style.display = 'none';
            document.getElementById('spinModal').style.display = 'none';
            isPaused = false; 
        }

        // SHOP LOGIC
        function buyTable(color, price) {
            if (coins >= price) { 
                coins -= price; tableColor = color; 
                updateUI(); closePanels(); playSauti(winSound); mremboSema("Meza imependeza!");
            } else { alert("Coins hazitoshi! Angalia tangazo."); }
        }

        function buyHome(type, price) {
            if (coins >= price) {
                coins -= price;
                if(type === 'underground') body.style.backgroundImage = "url('https://images.unsplash.com/photo-1574391884720-bbc3740c59d1?w=800')";
                else if(type === 'club') body.style.backgroundImage = "url('https://images.unsplash.com/photo-1566737236500-c8ac43014a67?w=800')";
                else if(type === 'neon') body.style.backgroundImage = "url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=800')";
                else if(type === 'villa') body.style.backgroundImage = "url('https://images.unsplash.com/photo-1613490493576-7fde63acd811?w=800')";
                else if(type === 'yacht') body.style.backgroundImage = "url('https://images.unsplash.com/photo-1569263979104-865ab7cd8d13?w=800')";
                updateUI(); mremboSema("Hongera kwa mazingira mapya!"); closePanels();
            } else { alert("Coins hazitoshi mkuu!"); }
        }

        function handleUpload(event) {
            const reader = new FileReader();
            reader.onload = function() {
                body.style.backgroundImage = `url('${reader.result}')`;
                mremboSema("Picha yako inavutia sana!");
                closePanels();
            }
            if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
        }

        function openSpin() { document.getElementById('spinModal').style.display = 'flex'; }
        function startSpin() {
            const wheel = document.getElementById('wheel');
            const deg = Math.floor(Math.random() * 360) + 1800;
            wheel.style.transform = `rotate(${deg}deg)`;
            document.getElementById('spinBtn').disabled = true;
            setTimeout(() => {
                const prize = [1000, 200, 5000, 500, 100][Math.floor(Math.random()*5)];
                coins += prize; playSauti(coinSound);
                alert("HONGERA! Umeshinda 💰 " + prize); mremboSema("Umeshinda coins " + prize);
                updateUI(); closePanels(); document.getElementById('spinBtn').disabled = false;
            }, 4000);
        }

        // LEVEL UNLOCK LOGIC (THE 6 ADS SYSTEM)
        function watchAdToUnlockLevel() {
            if (unlockedLevels >= MAX_LEVELS) {
                alert("Umeshafungua level zote mkuu!"); return;
            }
            window.open(adLink, '_blank');
            adsWatchedForLevel++;
            
            if (adsWatchedForLevel >= 6) {
                adsWatchedForLevel = 0;
                unlockedLevels++;
                mremboSema("Safi sana! Level mpya ipo wazi sasa.");
                playSauti(winSound);
            } else {
                mremboSema(`Tangazo la ${adsWatchedForLevel} kati ya 6. Endelea mkuu.`);
            }
            localStorage.setItem("wAdsForLevel", adsWatchedForLevel);
            updateUI(); generateLevels();
        }

        function generateLevels() {
            const grid = document.getElementById('lvlButtons');
            grid.innerHTML = '';
            for (let i = 1; i <= MAX_LEVELS; i++) {
                const btn = document.createElement('button');
                btn.className = 'stat-box'; btn.style.padding = '15px';
                btn.innerText = (i <= unlockedLevels) ? i : '🔒';
                if(i <= unlockedLevels) btn.onclick = () => { level = i; startQuest(); };
                grid.appendChild(btn);
            }
            
            // Update the Ad Unlock Button text
            const adBtn = document.getElementById('btnUnlockAd');
            if(unlockedLevels >= MAX_LEVELS) {
                adBtn.innerText = "🌟 LEVEL ZOTE ZIPO WAZI 🌟";
                adBtn.disabled = true;
                adBtn.style.background = "#555";
            } else {
                adBtn.innerText = `🔓 FUNGUA NEXT LEVEL (ADS ${adsWatchedForLevel}/6)`;
            }
        }

        function startQuest() {
            document.getElementById('levelMap').style.display = 'none';
            document.getElementById('gameMenu').style.display = 'none';
            document.getElementById('lvlDisp').innerText = "L" + level;
            currentMode = "quest"; initLevel(level); isPaused = false;
        }

        function startFreeMode() {
            document.getElementById('gameMenu').style.display = 'none';
            document.getElementById('lvlDisp').innerText = "FREE";
            currentMode = "free"; initLevel(1); isPaused = false;
        }

        function watchAd() {
            window.open(adLink, '_blank');
            coins += 500; updateUI(); mremboSema("Asante sana!");
        }

        function updateUI() {
            document.getElementById('mainCoins').innerText = coins;
            document.getElementById('mainLives').innerText = lives;
            document.getElementById('shopCoins').innerText = coins;
            document.getElementById('shopLives').innerText = lives;
            localStorage.setItem("wCoins", coins);
            localStorage.setItem("wLives", lives);
            localStorage.setItem("unlockedLevels", unlockedLevels);
        }

        // PHYSICS & RENDERING
        function initLevel(l) {
            balls = [{x:80, y:100, r:10, c:'white', dx:0, dy:0}];
            let startX = 220; let startY = 100;
            let count = (currentMode === "quest") ? l + 1 : 6;
            for(let i=0; i<count; i++) {
                balls.push({ x: startX + Math.floor(i/2)*18, y: startY + (i%2===0 ? i*9 : -i*9), r: 10, c:`hsl(${i*50},70%,50%)`, dx:0, dy:0 });
            }
        }

        function getCoords(e) {
            const r = canvas.getBoundingClientRect();
            const scaleX = canvas.width / r.width;
            const scaleY = canvas.height / r.height;
            let clientX = e.clientX, clientY = e.clientY;
            if(e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
            return { x: (clientX - r.left) * scaleX, y: (clientY - r.top) * scaleY };
        }

        function handleStart(e) {
            if(isPaused) return;
            const pos = getCoords(e);
            if (Math.hypot(pos.x-balls[0].x, pos.y-balls[0].y) < 30) isDragging = true;
        }

        function handleMove(e) {
            if(!isDragging || isPaused) return;
            e.preventDefault();
            const pos = getCoords(e); mouseX = pos.x; mouseY = pos.y;
            let power = Math.min(Math.hypot(mouseX-balls[0].x, mouseY-balls[0].y), 100);
            document.getElementById('powerIndicator').style.width = power + "%";
        }

        function handleEnd() {
            if(!isDragging || isPaused) return;
            balls[0].dx = (balls[0].x - mouseX) * 0.18; balls[0].dy = (balls[0].y - mouseY) * 0.18;
            isDragging = false; document.getElementById('powerIndicator').style.width = "0%";
            playSauti(clackSound);
        }

        canvas.addEventListener('mousedown', handleStart); canvas.addEventListener('mousemove', handleMove); canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('touchstart', handleStart, {passive: false}); canvas.addEventListener('touchmove', handleMove, {passive: false}); canvas.addEventListener('touchend', handleEnd);

        function drawRealisticBall(ctx, x, y, radius, color) {
            ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.beginPath(); ctx.arc(x + 3, y + 4, radius, 0, 7); ctx.fill();
            if(color === 'white') { ctx.fillStyle = '#eee'; ctx.beginPath(); ctx.arc(x,y,radius,0,7); ctx.fill(); } 
            else {
                let shadowGrad = ctx.createRadialGradient(x,y,0, x,y,radius);
                shadowGrad.addColorStop(0, color); shadowGrad.addColorStop(1, '#111');
                ctx.fillStyle = shadowGrad; ctx.beginPath(); ctx.arc(x, y, radius, 0, 7); ctx.fill();
            }
            let lightGrad = ctx.createRadialGradient(x-radius/3, y-radius/3, 0, x-radius/3, y-radius/3, radius*0.6);
            lightGrad.addColorStop(0, 'rgba(255,255,255,0.8)'); lightGrad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = lightGrad; ctx.beginPath(); ctx.arc(x, y, radius, 0, 7); ctx.fill();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = tableColor; ctx.fillRect(0, 0, 350, 200);
            
            ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(10,10); ctx.lineTo(340,10); ctx.lineTo(350,0); ctx.fill();
            ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(10,10); ctx.lineTo(10,190); ctx.lineTo(0,200); ctx.fill();
            ctx.fillStyle = "rgba(255,255,255,0.15)"; ctx.beginPath(); ctx.moveTo(0,200); ctx.lineTo(10,190); ctx.lineTo(340,190); ctx.lineTo(350,200); ctx.fill();
            ctx.fillStyle = "rgba(255,255,255,0.05)"; ctx.beginPath(); ctx.moveTo(350,0); ctx.lineTo(340,10); ctx.lineTo(340,190); ctx.lineTo(350,200); ctx.fill();

            [[0,0],[175,0],[350,0],[0,200],[175,200],[350,200]].forEach(p => {
                ctx.fillStyle = "#050505"; ctx.beginPath(); ctx.arc(p[0], p[1], 16, 0, 7); ctx.fill();
                ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.beginPath(); ctx.arc(p[0], p[1]-2, 14, 0, 7); ctx.fill();
            });

            if (isDragging && !isPaused) {
                ctx.save(); ctx.translate(balls[0].x, balls[0].y); ctx.rotate(Math.atan2(mouseY-balls[0].y, mouseX-balls[0].x));
                ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(40, 2, 130, 6);
                let woodGrad = ctx.createLinearGradient(40,-3,40,3);
                woodGrad.addColorStop(0, '#7e5a32'); woodGrad.addColorStop(0.5, '#c59b76'); woodGrad.addColorStop(1, '#3d251e');
                ctx.fillStyle = woodGrad; ctx.fillRect(40, -3, 130, 6);
                ctx.fillStyle = "#fff"; ctx.fillRect(40, -3, 5, 6); ctx.fillStyle = "#00bfff"; ctx.fillRect(38, -3, 2, 6);
                ctx.restore();
            }

            if(!isPaused) {
                balls.forEach((b, i) => {
                    b.x += b.dx; b.y += b.dy; b.dx *= 0.985; b.dy *= 0.985;
                    if(b.x<12 || b.x>338) { b.dx*=-0.8; b.x = b.x<12?12:338; }
                    if(b.y<12 || b.y>188) { b.dy*=-0.8; b.y = b.y<12?12:188; }
                    
                    if((b.x<25 || b.x>325) && (b.y<25 || b.y>175) || (b.x>160 && b.x<190 && (b.y<20 || b.y>180))) {
                        if(b.c==='white') { b.x=80; b.y=100; b.dx=0; b.dy=0; lives--; mremboSema("Faulo mkuu!"); }
                        else { 
                            balls.splice(i,1); coins+=50; playSauti(coinSound);
                            if(balls.length===1) {
                                if(currentMode==="quest") {
                                    if(level === unlockedLevels && unlockedLevels < MAX_LEVELS) unlockedLevels++;
                                    playSauti(winSound); openPanel('levels'); mremboSema("Hongera mkuu, umeshinda!");
                                    window.open(adLink, '_blank');
                                } else { level++; initLevel(level); mremboSema("Safi sana!"); window.open(adLink, '_blank'); }
                            }
                        }
                        updateUI(); 
                        if(lives<=0) { mremboSema("Mchezo umeisha."); alert("GAME OVER!"); lives=3; initLevel(level); updateUI(); }
                    }

                    for (let j = i+1; j < balls.length; j++) {
                        let b2 = balls[j]; let dx = b2.x - b.x; let dy = b2.y - b.y; let dist = Math.hypot(dx, dy);
                        if (dist < 20 && dist > 0) {
                            let overlap = (20 - dist) / 2; let nx = dx / dist; let ny = dy / dist;
                            b.x -= overlap * nx; b.y -= overlap * ny; b2.x += overlap * nx; b2.y += overlap * ny;
                            let dvx = b.dx - b2.dx; let dvy = b.dy - b2.dy; let vn = dvx * nx + dvy * ny;
                            if (vn > 0) {
                                let impulse = (1 + 0.9) * vn / 2;
                                b.dx -= impulse * nx; b.dy -= impulse * ny; b2.dx += impulse * nx; b2.dy += impulse * ny;
                                playSauti(clackSound); if(navigator.vibrate) navigator.vibrate(10);
                            }
                        }
                    }
                });
            }
            balls.forEach(b => drawRealisticBall(ctx, b.x, b.y, b.r, b.c));
            requestAnimationFrame(draw);
        }

        if(localStorage.getItem("wPlayerName")) { 
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('gameMenu').style.display = 'flex';
        }
        initLevel(1); draw(); updateUI();
    </script>
